[workspace]
authors = ["canoziia <canoziia@projectk.org>"]
channels = ["conda-forge"]
name = "vyos-scripts"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Convenience shortcut for the TypeScript Worker test suite (vitest); `install`
# is a no-op once cloudflare/node_modules is up to date.
install = { cmd = "npm install", cwd = "cloudflare" }
test = { cmd = "npm test", cwd = "cloudflare", depends-on = ["install"] }

# python deps are for the cache-generation tooling (configure/save-cache.py,
# tools/); nodejs provides node+npm so `pixi run test` works without a separate
# system Node install. The Worker itself is deployed via `npx wrangler deploy`.
[dependencies]
python = ">=3.14.6,<3.15"
nodejs = ">=20"
pyyaml = ">=6.0.3,<7"
requests = ">=2.32,<3"

# aggregate-prefixes is PyPI-only (pure Python); bgpq4 is a C tool that is not
# on conda-forge — install it from your system package manager (apt/brew).
[pypi-dependencies]
aggregate-prefixes = "*"
