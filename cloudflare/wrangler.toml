name = "vyos-config-generator"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# nodejs_compat satisfies stray node-builtin references pulled in by nunjucks;
# the Worker itself uses a custom in-memory template loader (no fs access).
compatibility_flags = ["nodejs_compat"]

# Bundle the BIRD/VyOS Nunjucks templates (.njk), BIRD default snippets (.bird)
# and the birds helper as Text modules so they import as strings at build time.
[[rules]]
type = "Text"
globs = ["**/*.njk", "**/*.bird", "**/birds.py"]
fallthrough = true
