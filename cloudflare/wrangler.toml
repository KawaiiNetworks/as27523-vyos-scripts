name = "vyos-config-generator"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# nodejs_compat satisfies stray node-builtin references pulled in by nunjucks;
# the Worker itself uses precompiled templates (no fs access, no eval).
compatibility_flags = ["nodejs_compat"]

# Precompile the Nunjucks templates to JS before bundling (the Workers runtime
# forbids eval/new Function, so templates can't be compiled from strings at
# runtime). Generates src/templates.generated.ts.
[build]
command = "node scripts/precompile-templates.mjs"

# Helper scripts are imported as Text modules (served verbatim).
[[rules]]
type = "Text"
globs = ["**/templates/vyos/*.py"]
fallthrough = true
