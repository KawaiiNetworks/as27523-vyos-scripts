name: Tests

on:
  push:
    branches: [main]
  pull_request:
  # Exposed so other workflows (e.g. deploy) can depend on the tests passing.
  workflow_call:

jobs:
  test:
    name: Run generator tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # bird2 provides the `bird` binary used by test_bird_config_parses
      # (`bird -p` is parse-only). Same config grammar as the musl build that
      # ships in the runtime container, so parsing results are identical.
      - name: Install BIRD parser
        run: |
          sudo apt-get update
          sudo apt-get install -y bird2
          bird --version

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Run tests
        run: pixi run test
