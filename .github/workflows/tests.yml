name: Tests

on:
  push:
    branches: [main]
  pull_request:
  # Exposed so other workflows (e.g. deploy) can depend on the tests passing.
  workflow_call:

jobs:
  test:
    name: Run generator tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # test_bird_config_parses parses the generated bird.conf with podman using
      # our BIRD image (apt's bird2 has no BMP). podman ships on ubuntu runners;
      # install only if missing. Override the image with BIRD_IMAGE if needed.
      - name: Ensure podman is available
        run: command -v podman || { sudo apt-get update && sudo apt-get install -y podman; }

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Run tests
        run: pixi run test
