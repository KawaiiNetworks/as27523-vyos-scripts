name: Build BIRD Docker

# Manual-only: pick bird2 or bird3 and publish to GHCR + Docker Hub
# as kawaiinetworks/bird:<bird-version> for linux/amd64 + linux/arm64.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which BIRD image to build"
        type: choice
        required: true
        default: bird2
        options:
          - bird2
          - bird3

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kawaiinetworks/bird

jobs:
  build_and_push_to_registries:
    name: Push Docker image to GHCR and Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Used to complete the identity challenge with sigstore/fulcio.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine BIRD version from Dockerfile
        id: ver
        run: |
          VER=$(grep -oP 'ARG\s+BIRD_VER=\K[^\s]+' "container/${{ inputs.target }}/Dockerfile")
          if [ -z "$VER" ]; then
            echo "Could not determine BIRD_VER from container/${{ inputs.target }}/Dockerfile" >&2
            exit 1
          fi
          MAJOR=${VER%%.*}
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "Building ${{ inputs.target }} -> ${{ env.IMAGE_NAME }}:$VER (+ :$MAJOR)"

      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.major }}

      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./container/${{ inputs.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        env:
          COSIGN_EXPERIMENTAL: "true"
        # Signs every produced tag at the pushed manifest digest.
        run: echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --yes {}@${{ steps.build-and-push.outputs.digest }}
