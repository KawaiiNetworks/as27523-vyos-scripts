local-asn: 27523

as-set-limit:
  member-limit: 2
  prefix-limit: 2
  large-as-list:
    - 13335

keepup-as-list:
  - 20473

blacklist:
  asn:
    - 21158
  as-set:
    - AS-TEST-BLACKLIST
  prefix4:
    - 192.0.2.0/24
  prefix6:
    - "2001:db8:bad::/48"

router:
  - name: core.test.example
    router-id: 192.0.2.254
    custom-config: "set system login banner post-login 'generated by tests'"

    service:
      bmp:
        - target: akvorado
          mirror: false
          address: 192.0.2.200
          port: 10179
        - target: mirror
          mirror: true
          address: 192.0.2.201
          port: 10180
      sflow:
        agent-address: 192.0.2.254
        interface: [eth0, eth1]
        vpp-interface: [eth2]
        server:
          - address: 192.0.2.202
            port: 6343
      snmp:
        listen-address: 192.0.2.254
        location: LAB
        encrypted-password: encrypted

    defines:
      prefix-sets:
        TEST-V4: [ "198.51.100.0/24{24,32}" ]
        TEST-V6: [ "2001:db8:100::/48{48,64}" ]
      as-sets:
        TEST-AS-PATH: [15169]   # was FRR as-path-list regex "_15169_"

    protocols:
      rpki:
        - server: 192.0.2.240
          port: 8282
          preference: 10

      bgp:
        parameters:
          - bestpath as-path multipath-relax

        ibgp:
          - description: Internal route reflector
            neighbor-address:
              - 192.0.2.10
              - "2001:db8:ffff::10"
            source-address: 192.0.2.254
            simple-out: true
            local-pref: 180
            pre-import-accept: |
              if net ~ test_v6 then reject;

        upstream:
          - asn: 6939
            description: HE upstream
            neighbor-address: 203.0.113.1
            source-address: 203.0.113.2
            password: secret
            multihop: 2
            holdtime: 90
            keepalive: 30
            address-family:
              ipv4: true
              ipv6: true
            addpath: true
            local-asn: 64500
            local-pref: 120
            metric: "+10"
            in-prepend: "6939"
            out-prepend: "27523 27523"
            soft-reconfiguration-inbound: false
            pre-import-accept: |
              if path_contains_asn_set(test_as_path) then {
                bgp_local_pref = 180;
                bgp_community.add((27523, 100));
                bgp_large_community.add((27523, 2001, 6939));
              }
              if net ~ test_v4 then {
                bgp_next_hop = 192.0.2.253;
                accept;
              }
              reject;
            pre-export-accept: |
              if net ~ test_v6 then {
                bgp_community.add((27523, 200));
                bgp_large_community.add((27523, 1100, 6939));
                accept;
              }
          - asn: 6453
            description: Second upstream
            neighbor-address: 198.51.100.253
            source-address: 198.51.100.254

        routeserver:
          - asn: 3491
            description: Route server
            neighbor-address:
              - 198.51.100.1
              - "2001:db8:1::1"
            source-address: 198.51.100.2
            metric: "+5"

        peer:
          - asn: 13335
            description: Cloudflare peer
            neighbor-address:
              - 198.51.100.2
              - "2001:db8:2::2"
            source-address: 198.51.100.3
            passive: true
            shutdown: true
            no-in-filter: true
            disable-IRR: true
            prefix-list:
              - 198.51.100.0/24
              - "2001:db8:100::/48"

        downstream:
          - asn: 15169
            description: Google downstream default
            neighbor-address: "2001:db8:3::3"
            source-address: "2001:db8:3::254"
            extended-nexthop: true
            addpath: true
            default-originate: true
          - asn: 65500
            description: Private downstream
            neighbor-address: 192.0.2.50
            source-address: 192.0.2.1
            extended-nexthop: true
            multihop: 255
            address-family:
              ipv4: true
              ipv6: true
            addpath: true
          - asn: 20473
            description: Bad cone but kept up
            neighbor-address: 203.0.113.73
            source-address: 203.0.113.74
            # extra-import-prefixes: listed prefixes skip the whole filter chain
            # (here: bypass this bad-cone AS's empty cone sets / validate_path).
            # Items may be a define name (TEST-V4) or an inline prefix, including
            # a ranged one — the latter is wrapped in [ ] in the rendered filter.
            extra-import-prefixes: [TEST-V4, "203.0.113.0/24{24,30}"]
          - asn: 395909
            description: Unnumbered downstream (link-local)
            neighbor-address: "fe80::1%wg"
            extended-nexthop: true

      # direct: which local (RTS_DEVICE) routes enter BIRD and are advertised.
      # Replaces the former top-level `redistribute`. Base whitelist = local-asn
      # prefixes + originate; the hook tags routes before the final accept.
      direct:
        extra-import-prefixes: [TEST-V4, "192.0.2.0/24"]
        pre-import-accept: |
          if net ~ test_v4 then {
            bgp_community.add((27523, 100));
            bgp_large_community.add((27523, 1100, 6939));
          }

      # kernel: BIRD -> VyOS host kernel table. Replaces the former top-level
      # `kernel`. Hook sets krt_prefsrc per source.
      kernel:
        ipv4:
          pre-export-accept: |
            if (source = RTS_BGP) then {
              krt_prefsrc = 203.0.113.1;
              if (net ~ test_v4) then {
                krt_prefsrc = 203.0.113.9;
                accept;
              }
            }
            if (source = RTS_STATIC) then {
              krt_prefsrc = 203.0.113.1;
            }
        ipv6:
          pre-export-accept: |
            if (source = RTS_BGP) then {
              krt_prefsrc = 2001:db8:2752::1;
              if net ~ test_v6 then reject;
            }

    # vrf: each VRF is an isolated routing context mirroring the default
    # `protocols` (own bgp/direct/kernel). Interfaces + the Linux VRF device/table
    # are assumed pre-created on the host; `table` is that device's table id.
    vrf:
      blue:
        table: 100
        protocols:
          bgp:
            downstream:
              - asn: 7843
                description: VRF blue downstream
                neighbor-address: 192.0.2.60
                source-address: 192.0.2.61
          direct:
            extra-import-prefixes: [TEST-V4]
            pre-import-accept: |
              if net ~ test_v4 then bgp_large_community.add((27523, 1100, 7843));
          kernel:
            ipv4:
              pre-export-accept: |
                if (source = RTS_BGP) then krt_prefsrc = 192.0.2.61;
