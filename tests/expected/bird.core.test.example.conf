# VRF tables/protocols — BEFORE neighbors so VRF BGP channels can reference the tables
# ============================================================================
# VRF routing contexts
# ============================================================================
# ----------------------------------------------------------------------------
# VRF blue (table 100)
# ----------------------------------------------------------------------------
ipv4 table vrf_blue_v4;
ipv6 table vrf_blue_v6;

filter filter_direct_vrf_blue_import_v4 {
  # Base: whitelist = local-asn prefixes + extra-import-prefixes
  if !(net ~ autogen_local_asn_prefix4 || net ~ test_v4) then reject;

  # ── pre-import-accept hook ──
  if net ~ test_v4 then bgp_large_community.add((27523, 1100, 7843));

  accept;
}

filter filter_direct_vrf_blue_import_v6 {
  # Base: whitelist = local-asn prefixes + extra-import-prefixes
  if !(net ~ autogen_local_asn_prefix6 || net ~ test_v4) then reject;

  # ── pre-import-accept hook ──
  if net ~ test_v4 then bgp_large_community.add((27523, 1100, 7843));

  accept;
}

protocol direct direct_vrf_blue {
  vrf "blue";
  ipv4 { table vrf_blue_v4; import filter filter_direct_vrf_blue_import_v4; };
  ipv6 { table vrf_blue_v6; import filter filter_direct_vrf_blue_import_v6; };
  interface "*";
}

protocol kernel kernel_vrf_blue_v4 {
  vrf "blue";
  kernel table 100;
  ipv4 {
    table vrf_blue_v4;
    export filter {
      if (source = RTS_BGP) then krt_prefsrc = 192.0.2.61;

      accept;
    };
    import filter filter_direct_vrf_blue_import_v4;
  };
  learn;
  persist;
}

protocol kernel kernel_vrf_blue_v6 {
  vrf "blue";
  kernel table 100;
  ipv6 {
    table vrf_blue_v6;
    export filter {
      accept;
    };
    import filter filter_direct_vrf_blue_import_v6;
  };
  learn;
  persist;
}

protocol static static_vrf_blue_v4 {
  ipv4 { table vrf_blue_v4; };
  route 0.0.0.0/0 reject { preference = 0; };
}
protocol static static_vrf_blue_v6 {
  ipv6 { table vrf_blue_v6; };
  route ::/0 reject { preference = 0; };
}

