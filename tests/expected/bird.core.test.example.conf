# ============================================================================
# Redistribution and Kernel Protocols
# ============================================================================

# Direct protocol import filters (which local routes enter BIRD and can be advertised via BGP)
filter filter_direct_import_v4 {
  # Base: whitelist = local-asn prefixes + extra-import-prefixes
  if !(net ~ autogen_local_asn_prefix4 || net ~ test_v4 || net ~ [ 192.0.2.0/24 ]) then reject;

  # ── pre-import-accept hook ──
  if net ~ test_v4 then {
    bgp_community.add((27523, 100));
    bgp_large_community.add((27523, 1100, 6939));
  }

  accept;
}

filter filter_direct_import_v6 {
  # Base: whitelist = local-asn prefixes + extra-import-prefixes
  if !(net ~ autogen_local_asn_prefix6 || net ~ test_v4 || net ~ [ 192.0.2.0/24 ]) then reject;

  # ── pre-import-accept hook ──
  if net ~ test_v4 then {
    bgp_community.add((27523, 100));
    bgp_large_community.add((27523, 1100, 6939));
  }

  accept;
}

protocol device {
  scan time 10;
}

protocol direct {
  # vrf "default": only non-VRF interfaces, so VRF-interface connected routes do
  # not leak into the main table (they belong to their own VRF direct below).
  vrf "default";
  ipv4 { import filter filter_direct_import_v4; };
  ipv6 { import filter filter_direct_import_v6; };
  interface "*";
}

# Kernel protocols for route exchange with VyOS host.
protocol kernel {
  ipv4 {
    export filter {
      if (source = RTS_BGP) then {
        krt_prefsrc = 203.0.113.1;
        if (net ~ test_v4) then {
          krt_prefsrc = 203.0.113.9;
          accept;
        }
      }
      if (source = RTS_STATIC) then {
        krt_prefsrc = 203.0.113.1;
      }

      accept;
    };
    import filter filter_direct_import_v4;
  };
  learn;
  persist;
}

protocol kernel {
  ipv6 {
    export filter {
      if (source = RTS_BGP) then {
        krt_prefsrc = 2001:db8:2752::1;
        if net ~ test_v6 then reject;
      }

      accept;
    };
    import filter filter_direct_import_v6;
  };
  learn;
  persist;
}

# Static routes placeholder for locally originated prefixes.
# The `preference = 0` default routes are a lowest-priority fallback: they exist
# only so a default-originate neighbor always has a 0/0 / ::/0 to advertise. Any
# real learned default (BGP / kernel) outranks them, and autogen_filter_ebgp
# (rfc7454 length floor) stops them leaking on normal eBGP export.
protocol static {
  ipv4;
  # Example: route 1.2.3.0/24 reject;
  route 0.0.0.0/0 reject { preference = 0; };
}

protocol static {
  ipv6;
  # Example: route 2001:db8::/48 reject;
  route ::/0 reject { preference = 0; };
}

# BMP Configuration
# Used for monitoring BGP sessions.
protocol bmp bmp_1 {
  station address ip 192.0.2.200 port 10179;
  monitoring rib in pre_policy off;
  monitoring rib in post_policy on;
}
protocol bmp bmp_2 {
  station address ip 192.0.2.201 port 10180;
  # BIRD has no BMP route-mirroring; approximate with pre-policy monitoring.
  monitoring rib in pre_policy on;
  monitoring rib in post_policy off;
}
