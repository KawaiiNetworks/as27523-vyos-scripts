  # pre export accept
  accept;
}

# ---------------------------------------------------------------------------
# Filter: AS7843 (Downstream) - VRF blue downstream
# ---------------------------------------------------------------------------
filter filter_d_as7843_nid8474_in {
  bool blackhole_triggered = check_blackhole();
  # pre import filter

  # import filter
  if (false) then { }
  else {
    if net.type = NET_IP4 && !(net ~ autogen_as7843_cone_prefix4) then reject;
    if net.type = NET_IP6 && !(net ~ autogen_as7843_cone_prefix6) then reject;
    if !blackhole_triggered then {
      if !autogen_as7843_validate_path() then reject;
      if !autogen_filter_ebgp() then reject;
    }
  }
  # post import filter

  # attr
  if blackhole_triggered then dest = RTD_BLACKHOLE;
  autogen_downstream_attrs();
  bgp_large_community.add(large_community_from_as(7843));
  bgp_large_community.add(large_community_from_neighbor_id(8474));

  # pre import accept
  accept;
}

filter filter_d_as7843_nid8474_out {
  bool blackhole_triggered = check_blackhole();
  # pre export filter

  # export filter
  # The directional / no-leak gate ALWAYS runs — even a blackhole must obey
  # valley-free routing (an upstream-learned route, even blackholed, must never
  # be re-advertised to another upstream/peer/route-server).
  if !autogen_downstream_out() then reject;
  # Content hygiene (bogons / RPKI / blacklist) is skipped for blackhole routes:
  # a /32 blackhole would otherwise be RPKI-invalid (more-specific than its ROA)
  # and dropped.
  if !blackhole_triggered then {
    if !autogen_filter_ebgp() then reject;
  }

  # export control communities
  # DNA (do-not-announce): drop if tagged not-to-anyone / not-to-this-AS / -nid
  if (bgp_large_community ~ large_community_dna_any) || (large_community_do_not_announce_to_as(7843) ~ bgp_large_community) || (large_community_do_not_announce_to_neighbor_id(8474) ~ bgp_large_community) then reject;
  # OLA (only-announce): drop if it carries an OLA community but none for this AS/nid
  if (bgp_large_community ~ large_community_ola_all) && !((large_community_only_announce_to_as(7843) ~ bgp_large_community) || (large_community_only_announce_to_neighbor_id(8474) ~ bgp_large_community)) then reject;
  # post export filter

  # attr
  autogen_apply_prepend_to_as(7843);
  # pre export accept
  accept;
}

